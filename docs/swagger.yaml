basePath: /api/v1
definitions:
  apipb.HelloData:
    properties:
      message:
        type: string
    type: object
  apipb.HelloReply:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/apipb.HelloData'
      message:
        type: string
    type: object
  apipb.OperationReply:
    properties:
      code:
        type: integer
      message:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Auth Info Service API Documentation
  title: Auth Info API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses: {}
      summary: 登录
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses: {}
      summary: 注册
      tags:
      - Auth
  /dict/items:
    get:
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: 根据类型编码获取字典数据列表
      tags:
      - Dict
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: 创建字典数据
      tags:
      - Dict
  /dict/items/{id}:
    delete:
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: 删除字典数据
      tags:
      - Dict
    put:
      consumes:
      - application/json
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: 更新字典数据
      tags:
      - Dict
  /dict/types:
    get:
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: 获取字典类型列表
      tags:
      - Dict
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: 创建字典类型
      tags:
      - Dict
  /dict/types/{id}:
    delete:
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: 删除字典类型
      tags:
      - Dict
    put:
      consumes:
      - application/json
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: 更新字典类型
      tags:
      - Dict
  /document/generate-pdf:
    post:
      consumes:
      - application/json
      produces:
      - application/pdf
      responses: {}
      security:
      - BearerAuth: []
      summary: 生成 PDF 文档
      tags:
      - Document
  /document/generate-word:
    post:
      consumes:
      - application/json
      produces:
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      responses: {}
      security:
      - BearerAuth: []
      summary: 生成 Word 文档
      tags:
      - Document
  /hello:
    get:
      consumes:
      - application/json
      description: 返回 Hello 消息
      parameters:
      - description: 名字
        in: query
        name: name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apipb.HelloReply'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apipb.OperationReply'
      security:
      - BearerAuth: []
      summary: Hello 示例接口
      tags:
      - Hello
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
