basePath: /api/v1
definitions:
  apipb.CreateDictItemRequest:
    properties:
      description:
        type: string
      item_key:
        type: string
      item_value:
        type: string
      sort:
        type: integer
      type_code:
        type: string
    type: object
  apipb.CreateDictTypeRequest:
    properties:
      code:
        type: string
      description:
        type: string
      name:
        type: string
      sort:
        type: integer
    type: object
  apipb.DictItem:
    properties:
      description:
        type: string
      id:
        type: integer
      item_key:
        type: string
      item_value:
        type: string
      sort:
        type: integer
      status:
        type: integer
      type_code:
        type: string
    type: object
  apipb.DictType:
    properties:
      code:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      sort:
        type: integer
    type: object
  apipb.GeneratePDFRequest:
    properties:
      data:
        $ref: '#/definitions/structpb.Struct'
      template_name:
        type: string
    type: object
  apipb.GenerateWordRequest:
    properties:
      data:
        $ref: '#/definitions/structpb.Struct'
      template_name:
        type: string
    type: object
  apipb.HelloData:
    properties:
      message:
        type: string
    type: object
  apipb.HelloReply:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/apipb.HelloData'
      message:
        type: string
    type: object
  apipb.ListDictItemsReply:
    properties:
      code:
        type: integer
      data:
        items:
          $ref: '#/definitions/apipb.DictItem'
        type: array
      message:
        type: string
    type: object
  apipb.ListDictTypesReply:
    properties:
      code:
        type: integer
      data:
        items:
          $ref: '#/definitions/apipb.DictType'
        type: array
      message:
        type: string
    type: object
  apipb.LoginData:
    properties:
      token:
        type: string
    type: object
  apipb.LoginReply:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/apipb.LoginData'
      message:
        type: string
    type: object
  apipb.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  apipb.OperationReply:
    properties:
      code:
        type: integer
      message:
        type: string
    type: object
  apipb.RegisterRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  apipb.UpdateDictItemRequest:
    properties:
      description:
        type: string
      id:
        type: integer
      item_key:
        type: string
      item_value:
        type: string
      sort:
        type: integer
      status:
        type: integer
    type: object
  apipb.UpdateDictTypeRequest:
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      sort:
        type: integer
    type: object
  structpb.Struct:
    properties:
      fields:
        additionalProperties:
          $ref: '#/definitions/structpb.Value'
        description: Unordered map of dynamically typed values.
        type: object
    type: object
  structpb.Value:
    properties:
      kind:
        description: "The kind of value.\n\nTypes that are valid to be assigned to
          Kind:\n\n\t*Value_NullValue\n\t*Value_NumberValue\n\t*Value_StringValue\n\t*Value_BoolValue\n\t*Value_StructValue\n\t*Value_ListValue"
    type: object
host: localhost:8080
info:
  contact: {}
  description: Auth Info Service API Documentation
  title: Auth Info API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: 公开接口：使用用户名和密码登录，成功后返回 JWT Token。
      parameters:
      - description: 登录参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/apipb.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            $ref: '#/definitions/apipb.LoginReply'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "401":
          description: 用户名或密码错误
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/apipb.OperationReply'
      summary: 登录
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: 公开接口：使用用户名和密码创建新用户。
      parameters:
      - description: 注册参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/apipb.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 注册成功
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "409":
          description: 用户名已存在
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/apipb.OperationReply'
      summary: 注册
      tags:
      - Auth
  /dict/items:
    get:
      description: 根据字典类型编码获取字典数据，按 sort 正序返回。
      parameters:
      - description: 字典类型编码
        in: query
        name: type_code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 请求成功
          schema:
            $ref: '#/definitions/apipb.ListDictItemsReply'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "401":
          description: 未认证
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "403":
          description: 无访问权限
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/apipb.OperationReply'
      security:
      - BearerAuth: []
      summary: 获取字典数据列表
      tags:
      - Dict
    post:
      consumes:
      - application/json
      description: 创建一个新的字典数据项，默认启用。
      parameters:
      - description: 创建字典数据参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/apipb.CreateDictItemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "401":
          description: 未认证
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "403":
          description: 无访问权限
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/apipb.OperationReply'
      security:
      - BearerAuth: []
      summary: 创建字典数据
      tags:
      - Dict
  /dict/items/{id}:
    delete:
      description: 根据路径 ID 软删除字典数据。
      parameters:
      - description: 字典数据 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "401":
          description: 未认证
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "403":
          description: 无访问权限
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "404":
          description: 字典数据不存在
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/apipb.OperationReply'
      security:
      - BearerAuth: []
      summary: 删除字典数据
      tags:
      - Dict
    put:
      consumes:
      - application/json
      description: 根据路径 ID 更新字典数据的键、值、描述、排序和状态。
      parameters:
      - description: 字典数据 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新字典数据参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/apipb.UpdateDictItemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "401":
          description: 未认证
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "403":
          description: 无访问权限
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "404":
          description: 字典数据不存在
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/apipb.OperationReply'
      security:
      - BearerAuth: []
      summary: 更新字典数据
      tags:
      - Dict
  /dict/types:
    get:
      description: 获取全部字典类型，按 sort 正序返回。
      produces:
      - application/json
      responses:
        "200":
          description: 请求成功
          schema:
            $ref: '#/definitions/apipb.ListDictTypesReply'
        "401":
          description: 未认证
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "403":
          description: 无访问权限
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/apipb.OperationReply'
      security:
      - BearerAuth: []
      summary: 获取字典类型列表
      tags:
      - Dict
    post:
      consumes:
      - application/json
      description: 创建一个新的字典类型，code 必须唯一。
      parameters:
      - description: 创建字典类型参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/apipb.CreateDictTypeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "401":
          description: 未认证
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "403":
          description: 无访问权限
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "409":
          description: 字典类型编码已存在
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/apipb.OperationReply'
      security:
      - BearerAuth: []
      summary: 创建字典类型
      tags:
      - Dict
  /dict/types/{id}:
    delete:
      description: 根据路径 ID 软删除字典类型。
      parameters:
      - description: 字典类型 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "401":
          description: 未认证
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "403":
          description: 无访问权限
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "404":
          description: 字典类型不存在
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/apipb.OperationReply'
      security:
      - BearerAuth: []
      summary: 删除字典类型
      tags:
      - Dict
    put:
      consumes:
      - application/json
      description: 根据路径 ID 更新字典类型名称、描述和排序，code 不可修改。
      parameters:
      - description: 字典类型 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新字典类型参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/apipb.UpdateDictTypeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "401":
          description: 未认证
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "403":
          description: 无访问权限
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "404":
          description: 字典类型不存在
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/apipb.OperationReply'
      security:
      - BearerAuth: []
      summary: 更新字典类型
      tags:
      - Dict
  /document/generate-pdf:
    post:
      consumes:
      - application/json
      description: 根据模板名称和数据生成 PDF 文件。
      parameters:
      - description: 生成 PDF 参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/apipb.GeneratePDFRequest'
      produces:
      - application/pdf
      responses:
        "200":
          description: PDF 文件
          schema:
            type: file
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "401":
          description: 未认证
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "403":
          description: 无访问权限
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "404":
          description: 模板不存在
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/apipb.OperationReply'
      security:
      - BearerAuth: []
      summary: 生成 PDF 文档
      tags:
      - Document
  /document/generate-word:
    post:
      consumes:
      - application/json
      description: 根据模板名称和数据生成 Word 文档文件。
      parameters:
      - description: 生成 Word 参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/apipb.GenerateWordRequest'
      produces:
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      responses:
        "200":
          description: Word 文档文件
          schema:
            type: file
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "401":
          description: 未认证
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "403":
          description: 无访问权限
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "404":
          description: 模板不存在
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/apipb.OperationReply'
      security:
      - BearerAuth: []
      summary: 生成 Word 文档
      tags:
      - Document
  /hello:
    get:
      consumes:
      - application/json
      description: 返回 Hello 消息
      parameters:
      - description: 名字
        in: query
        name: name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 请求成功
          schema:
            $ref: '#/definitions/apipb.HelloReply'
        "401":
          description: 未认证
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "403":
          description: 无访问权限
          schema:
            $ref: '#/definitions/apipb.OperationReply'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/apipb.OperationReply'
      security:
      - BearerAuth: []
      summary: Hello 示例接口
      tags:
      - Hello
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
