basePath: /api/v1
definitions:
  handler.createDictItemRequest:
    properties:
      description:
        maxLength: 256
        type: string
      item_key:
        maxLength: 64
        type: string
      item_value:
        maxLength: 256
        type: string
      sort:
        type: integer
      type_code:
        maxLength: 64
        type: string
    required:
    - item_key
    - item_value
    - type_code
    type: object
  handler.createDictTypeRequest:
    properties:
      code:
        maxLength: 64
        type: string
      description:
        maxLength: 256
        type: string
      name:
        maxLength: 128
        type: string
      sort:
        type: integer
    required:
    - code
    - name
    type: object
  handler.loginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  handler.registerRequest:
    properties:
      password:
        maxLength: 64
        minLength: 6
        type: string
      username:
        maxLength: 32
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  handler.updateDictItemRequest:
    properties:
      description:
        maxLength: 256
        type: string
      item_key:
        maxLength: 64
        type: string
      item_value:
        maxLength: 256
        type: string
      sort:
        type: integer
      status:
        maximum: 1
        minimum: 0
        type: integer
    required:
    - item_key
    - item_value
    type: object
  handler.updateDictTypeRequest:
    properties:
      description:
        maxLength: 256
        type: string
      name:
        maxLength: 128
        type: string
      sort:
        type: integer
    required:
    - name
    type: object
host: localhost:8080
info:
  contact: {}
  description: Auth Info Service API Documentation
  title: Auth Info API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: 登录信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 登录
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: 注册信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.registerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 注册
      tags:
      - Auth
  /dict/items:
    get:
      parameters:
      - description: 字典类型编码
        in: query
        name: type_code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 根据类型编码获取字典数据列表
      tags:
      - Dict
    post:
      consumes:
      - application/json
      parameters:
      - description: 字典数据信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.createDictItemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 创建字典数据
      tags:
      - Dict
  /dict/items/{id}:
    delete:
      parameters:
      - description: 字典数据 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 删除字典数据
      tags:
      - Dict
    put:
      consumes:
      - application/json
      parameters:
      - description: 字典数据 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.updateDictItemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 更新字典数据
      tags:
      - Dict
  /dict/types:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取字典类型列表
      tags:
      - Dict
    post:
      consumes:
      - application/json
      parameters:
      - description: 字典类型信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.createDictTypeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 创建字典类型
      tags:
      - Dict
  /dict/types/{id}:
    delete:
      parameters:
      - description: 字典类型 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 删除字典类型
      tags:
      - Dict
    put:
      consumes:
      - application/json
      parameters:
      - description: 字典类型 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.updateDictTypeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 更新字典类型
      tags:
      - Dict
  /hello:
    get:
      consumes:
      - application/json
      description: 返回 Hello 消息
      parameters:
      - description: 名字
        in: query
        name: name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Hello 示例接口
      tags:
      - Hello
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
