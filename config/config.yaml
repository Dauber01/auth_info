server:
  port: 8080
  mode: debug

log:
  level: debug
  format: json

mysql:
  host: localhost
  port: 3306
  user: root
  password: "password"
  dbname: auth_info
  charset: utf8mb4
  pool:
    max_open_conns: 100
    max_idle_conns: 10
    conn_max_lifetime: "1h"
    conn_max_idle_time: "10m"

jwt:
  secret: "change-this-secret-in-production"
  expire: 24  # hours

casbin:
  model: "config/rbac_model.conf"
