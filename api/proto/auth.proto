syntax = "proto3";

package api;

option go_package = "auth_info/api/gen/api/proto;apipb";

message RegisterRequest {
  string username = 1;
  string password = 2;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginData {
  string token = 1;
}

message LoginReply {
  int32 code = 1;
  string message = 2;
  LoginData data = 3;
}
