syntax = "proto3";

package hello;

option go_package = "auth_info/api/gen/hello;hello";

// HelloRequest 请求消息
message HelloRequest {
  string name = 1;
}

// HelloReply 响应消息
message HelloReply {
  string message = 1;
  int32 code = 2;
}

// HelloService gRPC 服务定义
service HelloService {
  // SayHello 方法
  rpc SayHello(HelloRequest) returns (HelloReply);
}
