syntax = "proto3";

package hello;

option go_package = "auth_info/api/gen/api/proto;apipb";

message HelloRequest {
  string name = 1;
}

message HelloData {
  string message = 1;
}

message HelloReply {
  int32 code = 1;
  string message = 2;
  HelloData data = 3;
}

service HelloService {
  rpc SayHello(HelloRequest) returns (HelloReply);
}
