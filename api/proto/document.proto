syntax = "proto3";

package api;

option go_package = "auth_info/api/gen/api/proto;apipb";

import "google/protobuf/struct.proto";

message GeneratePDFRequest {
  string template_name = 1;
  google.protobuf.Struct data = 2;
}

message GenerateWordRequest {
  string template_name = 1;
  google.protobuf.Struct data = 2;
}
